<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>7-сабақ: Айнымалы және мәлімет типтері</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:white;min-height:100vh;display:flex;flex-direction:column;}

header{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);padding:18px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:200;}
.logo{font-size:22px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
nav a{margin-left:24px;text-decoration:none;color:rgba(255,255,255,0.55);font-weight:500;font-size:14px;transition:0.3s;}
nav a:hover{color:white;}

.body-wrap{display:flex;flex:1;}

.sidebar{width:300px;background:rgba(255,255,255,0.03);border-right:1px solid rgba(255,255,255,0.07);height:calc(100vh - 62px);position:sticky;top:62px;overflow-y:auto;padding:20px 12px;display:flex;flex-direction:column;justify-content:space-between;flex-shrink:0;}
.sidebar-top h2{text-align:center;margin-bottom:18px;font-size:16px;font-weight:700;}
.lesson{position:relative;display:flex;align-items:center;gap:11px;padding:11px 12px;margin:4px 0;border-radius:10px;cursor:pointer;transition:0.3s;font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);}
.lesson:hover{background:rgba(255,255,255,0.07);color:white;}
.lesson.active{background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);color:white;}
.lesson.done{color:rgba(255,255,255,0.7);}
.badge{width:24px;height:24px;border-radius:50%;background:rgba(99,102,241,0.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;color:white;}
.lesson.active .badge{background:#6366f1;}
.lesson.done .badge{background:#22c55e;}
.lesson.locked{opacity:0.45;cursor:not-allowed;}
.lesson.locked::after{content:"";position:absolute;inset:0;border-radius:10px;}
.lock-icon{position:absolute;right:12px;font-size:12px;opacity:0.5;}
.lesson.locked:hover{background:transparent;}
.help{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);color:rgba(255,255,255,0.55);padding:11px 14px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:10px;margin:16px 4px 4px;font-size:13px;font-weight:600;transition:0.3s;}
.help:hover{background:#6366f1;color:white;border-color:transparent;}
.help-icon{width:26px;height:26px;border-radius:50%;background:#6366f1;color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}

.content{flex:1;padding:32px 40px;overflow-y:auto;}

.progress-wrap{margin-bottom:28px;}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:7px;}
.progress-track{height:5px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:4px;width:46.67%;}

.video-wrap{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;height:320px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;position:relative;overflow:hidden;}
.video-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,rgba(99,102,241,0.15),transparent 60%),radial-gradient(circle at 70% 50%,rgba(139,92,246,0.1),transparent 60%);}
.video-inner{text-align:center;position:relative;z-index:1;}
.video-inner .play{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;box-shadow:0 8px 24px rgba(99,102,241,0.4);cursor:pointer;transition:0.3s;}
.video-inner .play:hover{transform:scale(1.1);}
.video-inner p{font-size:14px;color:rgba(255,255,255,0.4);}

.mini-map{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:22px;}
.dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,0.28);transition:0.2s;}
.dot.active{border-color:#6366f1;background:rgba(99,102,241,0.28);color:white;}
.dot.done-ok{border-color:#22c55e;background:rgba(34,197,94,0.18);color:#86efac;}
.dot.done-err{border-color:#ef4444;background:rgba(239,68,68,0.15);color:#fca5a5;}

.q-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:32px 34px;margin-bottom:16px;animation:fadeUp 0.32s ease;}
.q-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,0.13);border:1px solid rgba(99,102,241,0.22);border-radius:20px;padding:4px 13px;font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px;}
.q-text{font-size:17px;font-weight:700;color:white;line-height:1.65;margin-bottom:18px;}

/* Код блогы — таза, нақты */
.code-block{background:#0d1117;border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:18px 22px;margin-bottom:22px;font-family:'Courier New',monospace;font-size:15px;line-height:2.0;white-space:pre;}

.options{display:flex;flex-direction:column;gap:9px;}
.opt{display:flex;align-items:center;gap:13px;padding:13px 17px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:13px;cursor:pointer;transition:all 0.18s;user-select:none;}
.opt:hover:not(.correct):not(.wrong):not(.disabled){border-color:rgba(167,139,250,0.45);background:rgba(167,139,250,0.08);}
.opt.selected{border-color:#6366f1;background:rgba(99,102,241,0.14);}
.opt.correct{border-color:#22c55e;background:rgba(34,197,94,0.1);animation:pulseGreen 0.45s ease;cursor:default;}
.opt.wrong{border-color:#ef4444;background:rgba(239,68,68,0.1);cursor:default;}
.opt.disabled{cursor:default;pointer-events:none;}
.opt-letter{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.45);flex-shrink:0;transition:0.2s;}
.opt.selected .opt-letter{background:#6366f1;color:white;}
.opt.correct .opt-letter{background:#22c55e;color:white;}
.opt.wrong .opt-letter{background:#ef4444;color:white;}
.opt-text{font-size:14px;font-weight:500;color:rgba(255,255,255,0.8);}
.opt.selected .opt-text,.opt.correct .opt-text,.opt.wrong .opt-text{color:white;}
.opt-code{font-family:'Courier New',monospace;}

/* ── Match ── */
.match-area{display:flex;gap:28px;flex-wrap:wrap;margin-top:4px;}
.match-slots{flex:1;min-width:220px;display:flex;flex-direction:column;gap:10px;}
.match-row{display:flex;align-items:center;gap:12px;}
.match-lbl{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:#c4b5fd;min-width:80px;flex-shrink:0;}
.drop-slot{flex:1;min-height:44px;border:2px dashed rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,0.25);transition:0.2s;padding:6px 14px;cursor:default;font-family:'Courier New',monospace;}
.drop-slot.over{border-color:#a78bfa;background:rgba(167,139,250,0.08);}
.drop-slot.filled{border-color:rgba(99,102,241,0.5);background:rgba(99,102,241,0.1);color:#c4b5fd;font-weight:700;}
.drop-slot.correct{border-color:#22c55e !important;background:rgba(34,197,94,0.1) !important;color:#86efac !important;font-weight:700;}
.drop-slot.wrong{border-color:#ef4444 !important;background:rgba(239,68,68,0.08) !important;color:#fca5a5 !important;}
.chip-pool{flex:1;min-width:160px;display:flex;flex-direction:column;gap:8px;}
.chip-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.drag-chip{padding:11px 16px;background:rgba(99,102,241,0.15);border:1.5px solid rgba(99,102,241,0.4);border-radius:10px;font-size:13px;font-weight:700;color:#c4b5fd;cursor:grab;text-align:center;transition:0.2s;user-select:none;font-family:'Courier New',monospace;}
.drag-chip:hover{background:rgba(99,102,241,0.28);transform:translateY(-2px);}
.drag-chip.dragging{opacity:0.2;}
.drag-chip.used{opacity:0.18;pointer-events:none;cursor:default;transform:none;}

.feedback{display:none;padding:13px 17px;border-radius:12px;font-size:14px;font-weight:600;margin-top:14px;line-height:1.6;}
.feedback.ok{background:rgba(34,197,94,0.1);border-left:3px solid #22c55e;color:#86efac;display:block;}
.feedback.err{background:rgba(239,68,68,0.1);border-left:3px solid #ef4444;color:#fca5a5;display:block;}

.auto-next{display:none;align-items:center;gap:10px;font-size:13px;color:rgba(255,255,255,0.4);padding:12px 0 0;}
.auto-next.show{display:flex;}
.auto-ring{width:30px;height:30px;flex-shrink:0;}
.auto-ring svg{transform:rotate(-90deg);}
.auto-ring circle{fill:none;stroke:rgba(255,255,255,0.1);stroke-width:3;}
.ring-fill{stroke:#22c55e;stroke-dasharray:82;stroke-dashoffset:82;stroke-linecap:round;}

.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
.btn-submit{padding:13px 30px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:white;border-radius:12px;cursor:pointer;font-size:14px;font-family:'Segoe UI',sans-serif;font-weight:700;transition:0.25s;box-shadow:0 5px 18px rgba(99,102,241,0.28);}
.btn-submit:hover{transform:translateY(-2px);}
.btn-next{padding:13px 30px;background:linear-gradient(135deg,#059669,#10b981);border:none;color:white;border-radius:12px;cursor:pointer;font-size:14px;font-family:'Segoe UI',sans-serif;font-weight:700;transition:0.25s;display:none;}
.btn-next:hover{transform:translateY(-2px);}

.result-screen{display:none;text-align:center;padding:44px 16px 60px;}
.result-emoji{font-size:76px;margin-bottom:16px;}
.stars{font-size:30px;letter-spacing:4px;margin-bottom:14px;}
.result-score{font-size:54px;font-weight:800;margin-bottom:6px;}
.result-label{font-size:16px;font-weight:700;margin-bottom:6px;}
.result-sub{font-size:13px;color:rgba(255,255,255,0.38);margin-bottom:28px;line-height:1.7;}
.result-breakdown{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.rb-item{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px 22px;text-align:center;min-width:90px;}
.rb-val{font-size:26px;font-weight:800;margin-bottom:4px;}
.rb-lbl{font-size:11px;color:rgba(255,255,255,0.36);font-weight:600;text-transform:uppercase;}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-restart{padding:14px 30px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;color:white;border-radius:13px;cursor:pointer;font-size:15px;font-family:'Segoe UI',sans-serif;font-weight:700;transition:0.25s;}
.btn-restart:hover{transform:translateY(-2px);}
.btn-next-lesson{padding:14px 30px;background:linear-gradient(135deg,#059669,#10b981);border:none;color:white;border-radius:13px;font-size:15px;font-family:'Segoe UI',sans-serif;font-weight:700;transition:0.25s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
.btn-next-lesson:hover{transform:translateY(-2px);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGreen{0%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}70%{box-shadow:0 0 0 12px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
</style>
</head>

<script>
var QUESTIONS = [

  /* 1 — теория */
  { type:'radio', badge:'📚 Теория',
    text:'Python-да айнымалы (переменная) деген не?',
    opts:['Тек сандарды сақтайтын арнайы кілт',
          'Мәліметті сақтайтын және атауы бар жады ұяшығы',
          'Бағдарламаның атауы',
          'Экранға шығаратын команда'],
    answer:1 },

  /* 2 — int теория */
  { type:'radio', badge:'🔢 int',
    text:'int мәлімет типі қандай мәндерді сақтайды?',
    opts:['Бөлшек сандар', 'Мәтін жолдар', 'Бүтін сандар', 'Ақиқат/Жалған мәндер'],
    answer:2 },

  /* 3 — float теория */
  { type:'radio', badge:'🔣 float',
    text:'float мәлімет типіне қай мән жатады?',
    opts:['42', 'True', '"Python"', '3.14'],
    answer:3 },

  /* 4 — str теория */
  { type:'radio', badge:'📝 str',
    text:'str (string) типінің мәні Python-да қалай жазылады?',
    opts:['100', '3.14', '"Сәлем, Әлем!"', 'True'],
    answer:2 },

  /* 5 — bool теория */
  { type:'radio', badge:'✅ bool',
    text:'bool типі қандай екі мәнді ғана қабылдайды?',
    opts:['0 және 1', 'Иә және Жоқ', 'True және False', 'Ашық және Жабық'],
    answer:2 },

  /* 6 — код: type(int) */
  { type:'radio', badge:'🐍 Код оқу',
    text:'Мына код экранға не шығарады?',
    code:'x = 10\nprint(type(x))',
    opts:["&lt;class 'str'&gt;", "&lt;class 'float'&gt;", "&lt;class 'int'&gt;", "&lt;class 'bool'&gt;"],
    answer:2 },

  /* 7 — код: type(float) */
  { type:'radio', badge:'🐍 Код оқу',
    text:'Мына код экранға не шығарады?',
    code:'temperature = 36.6\nprint(type(temperature))',
    opts:["&lt;class 'int'&gt;", "&lt;class 'float'&gt;", "&lt;class 'str'&gt;", "36.6"],
    answer:1 },

  /* 8 — код: type(str) */
  { type:'radio', badge:'🐍 Код оқу',
    text:'Мына код экранға не шығарады?',
    code:'name = "Алмас"\nprint(type(name))',
    opts:["&lt;class 'int'&gt;", "&lt;class 'bool'&gt;", "&lt;class 'float'&gt;", "&lt;class 'str'&gt;"],
    answer:3 },

  /* 9 — код: bool нәтиже */
  { type:'radio', badge:'🐍 Код оқу',
    text:'Мына код экранға не шығарады?',
    code:'result = 10 > 5\nprint(result)',
    opts:['10', '5', 'True', 'False'],
    answer:2 },

  /* 10 — код: print(type(bool)) */
  { type:'radio', badge:'🐍 Код оқу',
    text:'Мына код экранға не шығарады?',
    code:'flag = True\nprint(type(flag))',
    opts:["True", "&lt;class 'int'&gt;", "&lt;class 'str'&gt;", "&lt;class 'bool'&gt;"],
    answer:3 },

  /* 11 — айнымалы атауы */
  { type:'radio', badge:'📌 Ереже',
    text:'Python-да айнымалы атауы қандай болуы МҮМКІН ЕМЕС?',
    opts:['my_name', 'age', '2result', 'first_number'],
    answer:2 },

  /* 12 — мәнді өзгерту */
  { type:'radio', badge:'📚 Теория',
    text:'Python-да айнымалының мәнін кейін өзгертуге бола ма?',
    opts:['Жоқ, бір рет берілген мән өзгермейді',
          'Иә, кез келген уақытта жаңа мән беруге болады',
          'Тек int типі өзгере алады',
          'Тек бағдарлама басында ғана'],
    answer:1 },

  /* 13 — str + int қате */
  { type:'radio', badge:'🐍 Код оқу',
    text:'Мына кодты іске қосса не болады?',
    code:'age = 16\nname = "Алмас"\nprint(name + age)',
    opts:['Алмас16',
          'Алмас + 16',
          'Қате шығады — str мен int қосуға болмайды',
          '16Алмас'],
    answer:2 },


  /* 14 — match: тип ↔ сипаттама */
  { type:'match', badge:'🔗 Сәйкестендір',
    text:'Мәлімет типін оның сипаттамасымен сәйкестендір',
    sub:'Чиптерді тиісті слотқа сүйре. Қате болса — орнын ауыстырып қайтадан жіберуге болады',
    slots:[
      { label:'int',   answer:'Бүтін сан'       },
      { label:'float', answer:'Бөлшек сан'      },
      { label:'str',   answer:'Мәтін жол'       },
      { label:'bool',  answer:'Ақиқат / Жалған' },
    ],
    chips:['Бөлшек сан', 'Мәтін жол', 'Бүтін сан', 'Ақиқат / Жалған'] },
];

/* ══ STATE ══ */
var current=0, results=[], answered=false;
var autoTimer=null, dragging=null;

buildMiniMap();
renderQuestion(0);

/* ── Mini map ── */
function buildMiniMap(){
  var mm=document.getElementById('miniMap'); mm.innerHTML='';
  QUESTIONS.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===0?' active':'');
    d.textContent=i+1;
    mm.appendChild(d);
  });
}
function updateMiniMap(){
  document.querySelectorAll('.dot').forEach(function(d,i){
    d.className='dot';
    if(i===current) d.classList.add('active');
    else if(results[i]===true)  d.classList.add('done-ok');
    else if(results[i]===false) d.classList.add('done-err');
  });
}

/* ── Render ── */
function renderQuestion(idx){
  clearAuto(); answered=false; dragging=null;
  removeDragListeners();
  updateMiniMap();
  var area=document.getElementById('quizArea');
  area.style.display='';
  document.getElementById('resultScreen').style.display='none';
  var q=QUESTIONS[idx];
  area.innerHTML = q.type==='radio' ? buildRadio(q,idx) : buildMatch(q,idx);
  if(q.type==='match') initDrag();
  document.querySelectorAll('.opt').forEach(function(o){
    o.addEventListener('click',function(){
      if(answered) return;
      document.querySelectorAll('.opt').forEach(function(x){x.classList.remove('selected');});
      o.classList.add('selected');
    });
  });
}

/* ── Код блогы — тек таза текст ── */
function codeHtml(raw){
  if(!raw) return '';
  var escaped = raw
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
  return '<div class="code-block">'+escaped+'</div>';
}

function buildRadio(q,idx){
  var isLast=(idx===QUESTIONS.length-1);
  var opts=q.opts.map(function(o,i){
    return '<div class="opt" data-idx="'+i+'">'
      +'<div class="opt-letter">'+['A','B','C','D'][i]+'</div>'
      +'<div class="opt-text opt-code">'+o+'</div>'
      +'</div>';
  }).join('');
  return '<div class="q-card">'
    +'<div class="q-badge">'+q.badge+'</div>'
    +'<div class="q-text">'+q.text+'</div>'
    +codeHtml(q.code)
    +'<div class="options">'+opts+'</div>'
    +'<div class="feedback" id="feedback"></div>'
    +autoRing(isLast)
    +'</div>'
    +'<div class="actions">'
      +'<button class="btn-submit" id="btnSubmit" onclick="submitRadio('+idx+')">✅ Жіберу</button>'
      +'<button class="btn-next"   id="btnNext"   onclick="goNext()">'+(isLast?'🏁 Нәтиже':'Келесі →')+'</button>'
    +'</div>';
}

function buildMatch(q,idx){
  var isLast=(idx===QUESTIONS.length-1);
  var slots=q.slots.map(function(s,i){
    return '<div class="match-row">'
      +'<div class="match-lbl">'+s.label+'</div>'
      +'<div class="drop-slot" data-idx="'+i+'" data-answer="'+s.answer+'">сүйре...</div>'
      +'</div>';
  }).join('');
  var chips=q.chips.map(function(c){
    return '<div class="drag-chip" draggable="true" data-word="'+c+'">'+c+'</div>';
  }).join('');
  return '<div class="q-card">'
    +'<div class="q-badge">'+q.badge+'</div>'
    +'<div class="q-text">'+q.text+'</div>'
    +(q.sub?'<div style="font-size:12px;color:rgba(255,255,255,0.3);margin:-8px 0 16px;">'+q.sub+'</div>':'')
    +'<div class="match-area">'
      +'<div class="match-slots">'+slots+'</div>'
      +'<div class="chip-pool"><div class="chip-title">📌 Сүйре</div>'+chips+'</div>'
    +'</div>'
    +'<div class="feedback" id="feedback"></div>'
    +autoRing(isLast)
    +'</div>'
    +'<div class="actions">'
      +'<button class="btn-submit" id="btnSubmit" onclick="submitMatch('+idx+')">✅ Тексер</button>'
      +'<button class="btn-next"   id="btnNext"   onclick="goNext()">'+(isLast?'🏁 Нәтиже':'Келесі →')+'</button>'
    +'</div>';
}

function autoRing(isLast){
  return '<div class="auto-next" id="autoNext">'
    +'<div class="auto-ring"><svg viewBox="0 0 28 28" width="28" height="28">'
      +'<circle cx="14" cy="14" r="13"/>'
      +'<circle class="ring-fill" id="ringFill" cx="14" cy="14" r="13"/>'
    +'</svg></div>'
    +'<span>'+(isLast?'Нәтиже есептелуде...':'Келесі сұраққа өтіп жатыр...')+'</span>'
    +'</div>';
}

/* ══ DRAG & DROP — еркін жылжыту ══
   Чип → слот
   Слот → слот (ауыстыру)
   Слот → чип пулына қайтару (қажет емес, авто)
*/
var _onDragStart, _onDragEnd;

function initDrag(){
  _onDragStart = function(e){
    var chip = e.target.closest('.drag-chip:not(.used)');
    var slot = e.target.closest('.drop-slot.filled');
    if(chip){
      dragging = { kind:'chip', el:chip, word:chip.dataset.word };
      setTimeout(function(){ chip.classList.add('dragging'); },0);
    } else if(slot && slot.dataset.placed){
      dragging = { kind:'slot', el:slot, word:slot.dataset.placed };
      setTimeout(function(){ slot.style.opacity='0.3'; },0);
    }
  };
  _onDragEnd = function(){
    if(!dragging) return;
    if(dragging.el){
      dragging.el.classList.remove('dragging');
      dragging.el.style.opacity='';
    }
    /* dragging тек doDrop-та тазаланады */
  };
  document.addEventListener('dragstart', _onDragStart);
  document.addEventListener('dragend',   _onDragEnd);

  document.querySelectorAll('.drop-slot').forEach(function(zone){
    zone.addEventListener('dragover',  function(e){ e.preventDefault(); zone.classList.add('over'); });
    zone.addEventListener('dragleave', function(){ zone.classList.remove('over'); });
    zone.addEventListener('drop',      function(e){ e.preventDefault(); zone.classList.remove('over'); doDrop(zone); });
  });
}

function removeDragListeners(){
  if(_onDragStart) document.removeEventListener('dragstart', _onDragStart);
  if(_onDragEnd)   document.removeEventListener('dragend',   _onDragEnd);
  _onDragStart=null; _onDragEnd=null;
}

function doDrop(target){
  if(!dragging) return;

  var incoming = dragging.word;
  var displaced = target.dataset.placed || null;

  if(dragging.kind === 'chip'){
    /* ── Чип → слот ── */
    /* Егер мақсат слотта мән бар болса — сол чипті қайтару */
    if(displaced){
      document.querySelectorAll('.drag-chip').forEach(function(c){
        if(c.dataset.word === displaced) c.classList.remove('used');
      });
    }
    dragging.el.classList.add('used');

  } else {
    /* ── Слот → слот ── */
    var src = dragging.el;
    /* Бастапқы слотты ӘРДАЙЫМ бостат */
    src.textContent = 'сүйре...';
    src.classList.remove('filled','wrong','correct');
    src.removeAttribute('draggable');
    delete src.dataset.placed;

    /* Мақсатта мән болса — бастапқыға жылжыт */
    if(displaced){
      src.textContent = displaced;
      src.dataset.placed = displaced;
      src.classList.add('filled');
      src.setAttribute('draggable','true');
    }
  }

  /* Мақсат слотты толтыр */
  target.textContent = incoming;
  target.dataset.placed = incoming;
  target.classList.add('filled');
  target.classList.remove('wrong','correct','over');
  target.setAttribute('draggable','true');

  dragging = null;
}

/* ══ SUBMIT RADIO ══ */
function submitRadio(idx){
  if(answered) return;
  var sel=document.querySelector('.opt.selected');
  var fb=document.getElementById('feedback');
  if(!sel){ fb.className='feedback err'; fb.textContent='⚠️ Алдымен жауап таңда!'; return; }
  var chosen=parseInt(sel.getAttribute('data-idx'));
  if(chosen===QUESTIONS[idx].answer){
    answered=true;
    document.querySelectorAll('.opt').forEach(function(o,i){
      o.classList.add('disabled');
      if(i===QUESTIONS[idx].answer) o.classList.add('correct');
    });
    document.getElementById('btnSubmit').style.display='none';
    results[idx]=true;
    fb.className='feedback ok'; fb.innerHTML='✅ <b>Дұрыс!</b> Жарайсың!';
    updateMiniMap(); startAuto(idx);
  } else {
    sel.classList.add('wrong');
    fb.className='feedback err'; fb.innerHTML='❌ <b>Қате!</b> Қайтадан таңдап көр.';
    setTimeout(function(){ sel.classList.remove('wrong','selected'); fb.style.display='none'; }, 900);
  }
}

/* ══ SUBMIT MATCH ══ */
function submitMatch(idx){
  if(answered) return;
  var slots=document.querySelectorAll('.drop-slot');
  var fb=document.getElementById('feedback');
  var allFilled=true;
  slots.forEach(function(z){ if(!z.dataset.placed) allFilled=false; });
  if(!allFilled){ fb.className='feedback err'; fb.textContent='⚠️ Барлық жолақтарды толтыр!'; return; }

  var allCorrect=true;
  slots.forEach(function(z){
    z.classList.remove('filled');
    if(z.dataset.placed===z.dataset.answer) z.classList.add('correct');
    else{ z.classList.add('wrong'); allCorrect=false; }
  });

  document.getElementById('btnSubmit').style.display='none';

  if(allCorrect){
    answered=true;
    results[idx]=true;
    fb.className='feedback ok'; fb.innerHTML='✅ <b>Керемет!</b> Барлығы дұрыс!';
    updateMiniMap(); startAuto(idx);
  } else {
    /* Қате — 1.4 сек кейін reset: қайтадан сүйреуге болады */
    fb.className='feedback err'; fb.innerHTML='❌ <b>Қате бар!</b> Орындарын ауыстырып қайтадан тексер.';
    setTimeout(function(){
      slots.forEach(function(z){
        /* тек қате слоттарды визуалды тазала, мәнді сақта */
        if(z.classList.contains('wrong')){
          z.classList.remove('wrong');
          z.classList.add('filled');
        }
        if(z.classList.contains('correct')){
          z.classList.remove('correct');
          z.classList.add('filled');
        }
      });
      document.getElementById('btnSubmit').style.display='';
      fb.style.display='none';
    }, 1400);
  }
}

/* ══ AUTO ══ */
function startAuto(idx){
  var isLast=(idx===QUESTIONS.length-1);
  var an=document.getElementById('autoNext');
  var ring=document.getElementById('ringFill');
  if(!an||!ring) return;
  an.classList.add('show');
  document.getElementById('btnNext').style.display='';
  ring.style.transition='none'; ring.style.strokeDashoffset='82';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    ring.style.transition='stroke-dashoffset 3s linear';
    ring.style.strokeDashoffset='0';
  }); });
  autoTimer=setTimeout(function(){
    if(isLast) showResult(); else{ current++; renderQuestion(current); }
  },3000);
}
function clearAuto(){ if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; } }
function goNext(){
  clearAuto();
  if(current<QUESTIONS.length-1){ current++; renderQuestion(current); }
  else showResult();
}

/* ══ RESULT ══ */
function showResult(){
  var correct=results.filter(function(r){return r===true;}).length;
  var wrong=results.filter(function(r){return r===false;}).length;
  var total=QUESTIONS.length, pct=Math.round((correct/total)*100);
  var emoji,stars,label,sub;
  if(pct===100){ emoji='🏆';stars='⭐⭐⭐';label='Тамаша нәтиже!';sub='Барлық сұраққа дұрыс жауап бердің. Профессионал!'; }
  else if(pct>=80){ emoji='🎉';stars='⭐⭐⭐';label='Өте жақсы!';sub='Жоғары нәтиже! Жақсы болды.'; }
  else if(pct>=60){ emoji='😊';stars='⭐⭐';label='Жақсы!';sub='Теорияны бір рет қайта қарап шық.'; }
  else{ emoji='📚';stars='⭐';label='Жаттығу керек';sub='Видеоны қайта қарап, тестті қайталауды ұсынамыз.'; }
  document.getElementById('quizArea').style.display='none';
  document.getElementById('miniMap').style.display='none';
  var rs=document.getElementById('resultScreen'); rs.style.display='block';
  rs.innerHTML='<div class="result-emoji">'+emoji+'</div>'
    +'<div class="stars">'+stars+'</div>'
    +'<div class="result-score" style="color:'+(pct>=60?'#4ade80':'#f87171')+'">'+correct+' / '+total+'</div>'
    +'<div class="result-label">'+label+'</div>'
    +'<div class="result-sub">'+sub+'</div>'
    +'<div class="result-breakdown">'
      +'<div class="rb-item"><div class="rb-val" style="color:#4ade80">'+correct+'</div><div class="rb-lbl">✅ Дұрыс</div></div>'
      +'<div class="rb-item"><div class="rb-val" style="color:#f87171">'+wrong+'</div><div class="rb-lbl">❌ Қате</div></div>'
      +'<div class="rb-item"><div class="rb-val" style="color:#a78bfa">'+pct+'%</div><div class="rb-lbl">📊 Нәтиже</div></div>'
    +'</div>'
    +'<div class="result-actions">'
      +'<button class="btn-restart" onclick="restartQuiz()">🔄 Қайтадан тапсыру</button>'
      +(pct>=60?'<a href="lesson8.html" class="btn-next-lesson">Келесі сабақ →</a>':'')
    if(pct>=60 && typeof saveProgress==='function') saveProgress(8);
    +'</div>';
}

/* ══ RESTART ══ */
function restartQuiz(){
  current=0; results=[]; answered=false; dragging=null;
  clearAuto(); removeDragListeners();
  document.getElementById('miniMap').style.display='';
  buildMiniMap(); renderQuestion(0);
}

/* ══ LOCKED TOAST ══ */
function showWarnToast(msg){
  var el=document.getElementById('wT');
  if(!el){ el=document.createElement('div'); el.id='wT';
    el.style.cssText='position:fixed;top:78px;right:22px;background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.35);color:#fcd34d;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:500;backdrop-filter:blur(8px);transition:opacity 0.3s;';
    document.body.appendChild(el); }
  el.textContent=msg; el.style.opacity='1';
  setTimeout(function(){ el.style.opacity='0'; },2800);
}
window.addEventListener('load',function(){
  document.querySelectorAll('.lesson.locked').forEach(function(l){
    l.addEventListener('click',function(){ showWarnToast('🔒 Алдыңғы сабақты аяқтамай бұл сабақты ашу мүмкін емес!'); });
  });
});
